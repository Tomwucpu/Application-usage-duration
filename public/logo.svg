<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
    <defs>
        <!-- 背景渐变：深邃质感深蓝/黑 -->
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1e293b"/>
            <stop offset="100%" stop-color="#0f172a"/>
        </linearGradient>
        <!-- 进度环渐变：现代赛博朋克紫蓝渐变 -->
        <linearGradient id="ring" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#8b5cf6"/>
            <stop offset="50%" stop-color="#3b82f6"/>
            <stop offset="100%" stop-color="#06b6d4"/>
        </linearGradient>
        <!-- 屏幕发光效果 -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- 应用图标圆角矩形底板 - 已移除以实现透明背景 -->
    
    <!-- 显示器外框 (现已修改为正方形 1:1 比例) -->
    <rect x="16" y="16" width="480" height="480" rx="80" stroke="#475569" stroke-width="32" fill="#0f172a"/>
    
    <circle cx="256" cy="256" r="144" stroke="#334155" stroke-width="32" fill="none"/>
    
    <path d="M256 112 A144 144 0 1 1 112 256" stroke="url(#ring)" stroke-width="32" stroke-linecap="round" fill="none" filter="url(#glow)"/>
    
    <circle cx="256" cy="256" r="18" fill="#f8fafc"/>
    <path d="M256 256 L256 152" stroke="#f8fafc" stroke-width="18" stroke-linecap="round"/>
    <path d="M256 256 L320 300" stroke="#f8fafc" stroke-width="18" stroke-linecap="round"/>
    
    <circle cx="80" cy="80" r="10" fill="#ef4444"/>
    <circle cx="116" cy="80" r="10" fill="#eab308"/>
    <circle cx="152" cy="80" r="10" fill="#22c55e"/>
</svg>